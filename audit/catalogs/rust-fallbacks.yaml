rules:
  - id: rust-unwrap-or-default
    pattern: $X.unwrap_or_default()
    message: "Silent fallback: unwrap_or_default() discards error and uses Default::default()"
    severity: WARNING
    languages: [rust]

  - id: rust-ok-discard
    pattern: $X.ok()
    message: "Silent fallback: .ok() converts Result to Option, discarding the error"
    severity: WARNING
    languages: [rust]

  - id: rust-ignore-result
    pattern: let _ = $X;
    message: "Silent fallback: explicitly ignoring a Result or value"
    severity: WARNING
    languages: [rust]

  - id: rust-unwrap-or
    pattern: $X.unwrap_or($Y)
    message: "Silent fallback: unwrap_or() substitutes a value on error"
    severity: INFO
    languages: [rust]
